<kirby-page-title>Customer</kirby-page-title>

@if (vm.errorMessage(); as errorMessage) {
<kirby-flag themeColor="danger" style="white-space: pre-wrap"
    >{{ errorMessage }}</kirby-flag
>
<br />
}

<kirby-loading-overlay [isLoading]="vm.isLoading()">
    <atlas-customer-form [form]="vm.form"></atlas-customer-form>
</kirby-loading-overlay>

<kirby-modal-footer>
    <button
        kirby-button
        type="submit"
        [disabled]="vm.unsubmittable()"
        (click)="vm.submit()"
    >
        Submit
    </button>
</kirby-modal-footer>
