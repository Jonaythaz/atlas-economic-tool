<kirby-page-title>{{ vm.form.name().value() }}</kirby-page-title>

@if (vm.errorMessage(); as errorMessage) {
<kirby-flag
    themeColor="danger"
    style="margin-bottom: 16px; white-space: pre-wrap"
    >{{ errorMessage }}</kirby-flag
>
}

<kirby-loading-overlay [isLoading]="vm.isLoading()">
    <kirby-card [hasPadding]="true">
        <kirby-form-field label="ID">
            <input kirby-input type="number" [formField]="vm.form.id" />
        </kirby-form-field>
        <kirby-form-field label="EAN">
            <input kirby-input [formField]="vm.form.ean" />
        </kirby-form-field>
        <kirby-form-field
            label="Name"
            [message]="vm.form.name().errors().at(0)?.message"
        >
            <input
                kirby-input
                [formField]="vm.form.name"
                [hasError]="vm.form.name().invalid()"
            />
        </kirby-form-field>
        <kirby-form-field
            label="Street"
            [message]="vm.form.street().errors().at(0)?.message"
        >
            <input
                kirby-input
                [formField]="vm.form.street"
                [hasError]="vm.form.street().invalid()"
            />
        </kirby-form-field>
        <kirby-form-field
            label="City"
            [message]="vm.form.city().errors().at(0)?.message"
        >
            <input
                kirby-input
                [formField]="vm.form.city"
                [hasError]="vm.form.city().invalid()"
            />
        </kirby-form-field>
        <kirby-form-field
            label="Postal Code"
            [message]="vm.form.postalCode().errors().at(0)?.message"
        >
            <input
                kirby-input
                [formField]="vm.form.postalCode"
                [hasError]="vm.form.postalCode().invalid()"
            />
        </kirby-form-field>
        <kirby-form-field
            label="Country"
            [message]="vm.form.country().errors().at(0)?.message"
        >
            <input
                kirby-input
                [formField]="vm.form.country"
                [hasError]="vm.form.country().invalid()"
            />
        </kirby-form-field>
        <kirby-form-field
            label="Group"
            [message]="vm.form.group().errors().at(0)?.message"
        >
            <input
                kirby-input
                type="number"
                [formField]="vm.form.group"
                [hasError]="vm.form.group().invalid()"
            />
        </kirby-form-field>
        <kirby-form-field
            label="Payment Terms"
            [message]="vm.form.paymentTerms().errors().at(0)?.message"
        >
            <input
                kirby-input
                type="number"
                [formField]="vm.form.paymentTerms"
                [hasError]="vm.form.paymentTerms().invalid()"
            />
        </kirby-form-field>
        <kirby-form-field
            label="Vat Zone"
            [message]="vm.form.vatZone().errors().at(0)?.message"
        >
            <input
                kirby-input
                type="number"
                [formField]="vm.form.vatZone"
                [hasError]="vm.form.vatZone().invalid()"
            />
        </kirby-form-field>
    </kirby-card>
</kirby-loading-overlay>

<kirby-modal-footer>
    <button
        kirby-button
        type="submit"
        [disabled]="vm.unsubmittable()"
        (click)="vm.submit()"
    >
        {{ vm.submitMessage() }}
    </button>
</kirby-modal-footer>
