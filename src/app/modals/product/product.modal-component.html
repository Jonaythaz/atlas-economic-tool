<kirby-page-title>Product {{ vm.form.id().value() }}</kirby-page-title>

@if (vm.errorMessage(); as errorMessage) {
<kirby-flag
    themeColor="danger"
    style="margin-bottom: 16px; white-space: pre-wrap"
    >{{ errorMessage }}</kirby-flag
>
}

<kirby-loading-overlay [isLoading]="vm.isLoading()">
    <atlas-product-form [form]="vm.form"></atlas-product-form>
</kirby-loading-overlay>

<kirby-modal-footer>
    <button
        kirby-button
        type="submit"
        [disabled]="vm.unsubmittable()"
        (click)="vm.submit()"
    >
        Create
    </button>
</kirby-modal-footer>
