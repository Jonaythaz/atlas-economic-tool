<kirby-page-title>Create Products</kirby-page-title>

@if (vm.products().length > 0) {
<atlas-product-list
    [products]="vm.products()"
    (selected)="vm.view($event)"
></atlas-product-list>
} @else if (vm.state() === 'idle') {
<kirby-empty-state
    iconName="help"
    title="Idle"
    subtitle="The workflow hasn't reached this step yet"
></kirby-empty-state>
} @else {
<kirby-empty-state
    iconName="verify"
    themeColor="success"
    title="Success"
    subtitle="No products to create"
></kirby-empty-state>
}

<kirby-modal-footer>
    <button
        kirby-button
        type="submit"
        [disabled]="vm.unrunnable()"
        (click)="vm.run()"
    >
        Run Step
    </button>
</kirby-modal-footer>
