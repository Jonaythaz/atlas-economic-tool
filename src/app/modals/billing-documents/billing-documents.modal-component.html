<kirby-page-title>Create Billing Documents</kirby-page-title>

@if (vm.billingDocuments().length > 0) {
<atlas-billing-document-list
    [documents]="vm.billingDocuments()"
    (selected)="vm.view($event)"
></atlas-billing-document-list>
} @else if (vm.state() === 'idle') {
<kirby-empty-state
    iconName="help"
    title="Idle"
    subtitle="The workflow hasn't reached this step yet"
></kirby-empty-state>
} @else {
<kirby-empty-state
    iconName="verify"
    themeColor="success"
    title="Success"
    subtitle="No billing documents to create"
></kirby-empty-state>
}
