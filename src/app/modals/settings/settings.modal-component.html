<kirby-page-title>Settings</kirby-page-title>

<kirby-loading-overlay [isLoading]="vm.isLoading()">
    @if (vm.errorMessage(); as errorMessage) {
    <kirby-flag
        themeColor="danger"
        style="margin-bottom: 16px; white-space: pre-wrap"
        >{{ errorMessage }}</kirby-flag
    >
    }

    <atlas-settings-form [form]="vm.form"></atlas-settings-form>
</kirby-loading-overlay>

<kirby-modal-footer>
    <button
        kirby-button
        type="submit"
        [disabled]="vm.unsubmittable()"
        (click)="vm.submit()"
    >
        Save
    </button>
</kirby-modal-footer>
