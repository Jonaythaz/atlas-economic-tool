@let form = vm.form();

<kirby-card [hasPadding]="true">
    <kirby-form-field label="ID" [message]="vm.form().id().errors().at(0)?.message">
        <input kirby-input type="number" [formField]="form.id" [hasError]="vm.form().id().invalid()" />
    </kirby-form-field>

    @if (vm.isBusinessCustomer()) {
        <kirby-form-field label="EAN">
            <input kirby-input [formField]="vm.form().ean" />
        </kirby-form-field>
    }

    @if (vm.isPrivateCustomer()) {
        <kirby-form-field label="CPR">
            <input kirby-input [formField]="vm.form().cpr" />
        </kirby-form-field>

        <kirby-form-field label="Email" [message]="vm.form().email().errors().at(0)?.message">
            <input kirby-input [formField]="vm.form().email"
                [hasError]="vm.form().email().invalid()" />
        </kirby-form-field>
    }

    <kirby-form-field
        label="Name"
        [message]="form.name().errors().at(0)?.message"
    >
        <input
            kirby-input
            [formField]="form.name"
            [hasError]="form.name().invalid()"
        />
    </kirby-form-field>
    <kirby-form-field
        label="Street"
        [message]="form.street().errors().at(0)?.message"
    >
        <input
            kirby-input
            [formField]="form.street"
            [hasError]="form.street().invalid()"
        />
    </kirby-form-field>
    <kirby-form-field
        label="City"
        [message]="form.city().errors().at(0)?.message"
    >
        <input
            kirby-input
            [formField]="form.city"
            [hasError]="form.city().invalid()"
        />
    </kirby-form-field>
    <kirby-form-field
        label="Postal Code"
        [message]="form.postalCode().errors().at(0)?.message"
    >
        <input
            kirby-input
            [formField]="form.postalCode"
            [hasError]="form.postalCode().invalid()"
        />
    </kirby-form-field>
    <kirby-form-field
        label="Country"
        [message]="form.country().errors().at(0)?.message"
    >
        <input
            kirby-input
            [formField]="form.country"
            [hasError]="form.country().invalid()"
        />
    </kirby-form-field>
    <kirby-form-field
        label="Group"
        [message]="form.group().errors().at(0)?.message"
    >
        <input
            kirby-input
            type="number"
            [formField]="form.group"
            [hasError]="form.group().invalid()"
        />
    </kirby-form-field>
    <kirby-form-field
        label="Payment Terms"
        [message]="form.paymentTerms().errors().at(0)?.message"
    >
        <input
            kirby-input
            type="number"
            [formField]="form.paymentTerms"
            [hasError]="form.paymentTerms().invalid()"
        />
    </kirby-form-field>
    <kirby-form-field
        label="Vat Zone"
        [message]="form.vatZone().errors().at(0)?.message"
    >
        <input
            kirby-input
            type="number"
            [formField]="form.vatZone"
            [hasError]="form.vatZone().invalid()"
        />
    </kirby-form-field>
</kirby-card>
