@switch (status()) {
    @case ('in-progress') {
        <kirby-badge themeColor="warning">
            <kirby-icon name="recurring"></kirby-icon>
        </kirby-badge>
    }
    @case ('completed') {
        <kirby-badge themeColor="success">
            <kirby-icon name="checkmark-selected"></kirby-icon>
        </kirby-badge>
    }
    @case ('failed') {
        <kirby-badge themeColor="danger">
            <kirby-icon name="warning"></kirby-icon>
        </kirby-badge>
    }
}
